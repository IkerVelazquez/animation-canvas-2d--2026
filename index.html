<!DOCTYPE html>
<!-- Indica que el documento usa HTML5 -->

<html lang="es">
<!-- Define el idioma del documento como español -->

<head>
    <!-- Contiene metadatos y configuraciones del documento -->

    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres como UTF-8 (permite acentos, ñ, etc.) -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive en dispositivos móviles -->

    <title>POO con Canvas</title>
    <!-- Título que aparece en la pestaña del navegador -->
</head>

<body>
    <!-- Contenido visible de la página -->

    <!-- Elemento canvas donde se dibujarán los gráficos con JavaScript -->
    <canvas id="canvas"></canvas>

    <!-- 
        Enlaza el archivo JavaScript externo
        Este script contiene la lógica para dibujar y animar en el canvas
    -->
    <script src="js/main.js"></script>
</body>

</html>
